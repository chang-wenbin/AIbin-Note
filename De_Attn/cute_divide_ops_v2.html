
<style>
.tb{padding:5px 11px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;border-radius:var(--border-radius-md);font-size:12px;font-family:var(--font-mono);}
.tb.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);}
.gc{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border-radius:3px;font-family:var(--font-mono);transition:filter .1s;user-select:none;}
.gc:hover{filter:brightness(.85);}
.gc.sel{outline:2.5px solid var(--color-text-primary);outline-offset:-2px;}
.cb{font-family:var(--font-mono);font-size:13px;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);line-height:2.1;}
.hi{color:var(--color-text-info);font-weight:500;}
.dm{color:var(--color-text-tertiary);}
pre.code{font-family:var(--font-mono);font-size:12px;background:var(--color-background-secondary);padding:12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);line-height:1.85;white-space:pre-wrap;color:var(--color-text-secondary);margin:10px 0 0;}
</style>

<div id="root" style="padding:2px 0"></div>

<script>
const TABS = ['composition','logical_divide','zipped_divide','tiled_divide','flat_divide'];
let tab = 'logical_divide', sel = [1,4];

const TC = [['#B5D4F4','#0C447C'],['#9FE1CB','#085041'],['#CECBF6','#3C3489'],['#FAC775','#633806']];
const ti = (r,c) => (r<2?0:2)+(c<3?0:1);
const lin = (r,c) => r*6+c;
const cv = (r,c) => ({r_in:r%2,c_in:c%3,tr:Math.floor(r/2),tc:Math.floor(c/3),flat:(r%2)+(c%3)*2});

const DESC = {
  composition:   '函数复合：C(coord) = A(B(coord))。B 先把坐标映射成中间索引，A 再把中间索引重新映射到最终偏移。所有 divide 操作内部都基于 composition 实现。',
  logical_divide:'按 tile Layout（可有非自然 stride）切分。mode 0 = tile 内坐标（结构同 tile shape），mode 1 = tile 编号（结构同 tile 格数）。',
  zipped_divide: '把 tiled_divide 的结果沿空间维度"拉链"：每个 mode 对应一个空间方向，同时包含该方向的内层坐标和外层 tile 编号。',
  tiled_divide:  'tile 参数是 Shape（自然 stride）。mode 0 = tile 内坐标整体，mode 1 = tile 编号。GEMM kernel 最常用，local_tile 是其高层封装。',
  flat_divide:   'tile 内部坐标被压平成一个整数（列主序展开）。外层 tile 编号结构不变。适合只关心 tile 间迭代、tile 内线性遍历的场景。'
};

const SHAPE = {
  logical_divide: '((2,3), (2,2))',
  zipped_divide:  '((2,2), (3,2))',
  tiled_divide:   '((2,3), (2,2))',
  flat_divide:    '(_6,   (2,2))'
};

const CODE = {
  composition:`auto A = make_layout(make_shape(_6{}), make_stride(_4{}));
auto B = make_layout(make_shape(_2{},_3{}), make_stride(_3{},_1{}));
auto C = composition(A, B);
// C: shape (_2,_3), stride (_12,_4)
// C(r,c) = A(B(r,c)) = 4*(3r+c) = 12r + 4c`,
  logical_divide:`auto result = logical_divide(layout, tile);
// result shape: ((2,3),(2,2))
// result(make_coord(r_in,c_in), make_coord(tr,tc))
// tile 可以有非自然 stride（如转置 tile）`,
  zipped_divide:`auto result = zipped_divide(layout, tile);
// result shape: ((2,2),(3,2))
// mode0 对应行方向：(r_in, tr)
// mode1 对应列方向：(c_in, tc)
// result(make_coord(r_in,tr), make_coord(c_in,tc))`,
  tiled_divide:`auto result = tiled_divide(layout, make_shape(_2{},_3{}));
// result shape: ((2,3),(2,2))
// result(make_coord(r_in,c_in), make_coord(tr,tc))
//
// local_tile 是高层封装：
// local_tile(tensor, tile_shape, tile_coord)
// ≈ tiled_divide(tensor,tile_shape)(_, tile_coord)`,
  flat_divide:`auto result = flat_divide(layout, make_shape(_2{},_3{}));
// result shape: (_6, (2,2))
// flat_idx = r_in + c_in*2  (列主序)
// result(flat_idx, make_coord(tr,tc))`
};

function mkGrid(sr,sc){
  let s='<div style="display:inline-block">';
  s+='<div style="display:flex;gap:2px;margin-bottom:2px;margin-left:26px">';
  for(let c=0;c<6;c++) s+=`<div style="width:34px;text-align:center;font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono)">${c}</div>`;
  s+='</div>';
  for(let r=0;r<4;r++){
    s+=`<div style="display:flex;gap:2px;margin-bottom:2px;align-items:center"><div style="width:22px;font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);text-align:right;padding-right:4px">${r}</div>`;
    for(let c=0;c<6;c++){
      const [bg,fg]=TC[ti(r,c)];
      const isSel=r===sr&&c===sc;
      s+=`<div class="gc${isSel?' sel':''}" style="background:${bg};color:${fg}" onclick="pick(${r},${c})">${lin(r,c)}</div>`;
    }
    s+='</div>';
  }
  s+='</div>';
  s+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">';
  [['tile(0,0)',0],['tile(0,1)',1],['tile(1,0)',2],['tile(1,1)',3]].forEach(([n,i])=>{
    s+=`<span style="font-size:11px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:${TC[i][0]};border-radius:2px;display:inline-block"></span><span style="color:var(--color-text-secondary)">${n}</span></span>`;
  });
  s+='</div>';
  return s;
}

function infoBox(t,r,c){
  const {r_in,c_in,tr,tc,flat}=cv(r,c);
  const l=lin(r,c);
  if(t==='logical_divide') return `<div class="cb">结果 shape：<span class="hi">${SHAPE[t]}</span><br>
选中 <span class="hi">${l}</span> → tile 内坐标 make_coord(<span class="hi">${r_in}</span>,<span class="hi">${c_in}</span>)，tile 编号 make_coord(<span class="hi">${tr}</span>,<span class="hi">${tc}</span>)<br>
<span class="dm">result(make_coord(${r_in},${c_in}), make_coord(${tr},${tc}))</span></div>`;
  if(t==='zipped_divide') return `<div class="cb">结果 shape：<span class="hi">${SHAPE[t]}</span><br>
选中 <span class="hi">${l}</span> → mode0=行方向 make_coord(<span class="hi">${r_in}</span>,<span class="hi">${tr}</span>)，mode1=列方向 make_coord(<span class="hi">${c_in}</span>,<span class="hi">${tc}</span>)<br>
<span class="dm">result(make_coord(${r_in},${tr}), make_coord(${c_in},${tc}))</span></div>`;
  if(t==='tiled_divide') return `<div class="cb">结果 shape：<span class="hi">${SHAPE[t]}</span><br>
选中 <span class="hi">${l}</span> → tile 内坐标 make_coord(<span class="hi">${r_in}</span>,<span class="hi">${c_in}</span>)，tile 编号 make_coord(<span class="hi">${tr}</span>,<span class="hi">${tc}</span>)<br>
<span class="dm">result(make_coord(${r_in},${c_in}), make_coord(${tr},${tc}))</span></div>`;
  if(t==='flat_divide') return `<div class="cb">结果 shape：<span class="hi">${SHAPE[t]}</span><br>
选中 <span class="hi">${l}</span> → tile 内扁平坐标 <span class="hi">${flat}</span> (= ${r_in}+${c_in}×2 列主序)，tile 编号 make_coord(<span class="hi">${tr}</span>,<span class="hi">${tc}</span>)<br>
<span class="dm">result(${flat}, make_coord(${tr},${tc}))</span></div>`;
  return '';
}

function render(){
  const [sr,sc]=sel;
  let h='';
  // tabs
  h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">';
  TABS.forEach(t=>{h+=`<button class="tb${t===tab?' on':''}" onclick="setTab('${t}')">${t}</button>`;});
  h+='</div>';
  // desc
  h+=`<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:14px;line-height:1.7">${DESC[tab]}</div>`;

  if(tab==='composition'){
    h+=`<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
<div>
<svg width="430" height="130" viewBox="0 0 430 130">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="8" y="42" width="68" height="46" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="42" y="62" text-anchor="middle" font-size="12" font-family="var(--font-mono)" fill="#0C447C" font-weight="500">coord</text>
<text x="42" y="79" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="#185FA5">(r, c)</text>
<line x1="76" y1="65" x2="116" y2="65" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#ar)"/>
<rect x="116" y="30" width="90" height="70" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="161" y="60" text-anchor="middle" font-size="13" font-family="var(--font-mono)" fill="#0C447C" font-weight="500">B</text>
<text x="161" y="79" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="#185FA5">stride(3,1)</text>
<line x1="206" y1="65" x2="246" y2="65" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#ar)"/>
<text x="226" y="57" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="var(--color-text-tertiary)">B(r,c)</text>
<rect x="246" y="30" width="90" height="70" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
<text x="291" y="60" text-anchor="middle" font-size="13" font-family="var(--font-mono)" fill="#085041" font-weight="500">A</text>
<text x="291" y="79" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="#0F6E56">stride(4)</text>
<line x1="336" y1="65" x2="376" y2="65" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#ar)"/>
<text x="356" y="57" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="var(--color-text-tertiary)">A(·)</text>
<rect x="376" y="42" width="48" height="46" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="400" y="62" text-anchor="middle" font-size="12" font-family="var(--font-mono)" fill="#3C3489" font-weight="500">idx</text>
<text x="400" y="79" text-anchor="middle" font-size="10" font-family="var(--font-mono)" fill="#534AB7">12r+4c</text>
<rect x="101" y="12" width="250" height="106" rx="10" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="4 2"/>
<text x="226" y="10" text-anchor="middle" font-size="11" font-family="var(--font-sans)" fill="var(--color-text-tertiary)">composition(A, B)</text>
</svg>
<div class="cb" style="margin-top:8px;max-width:380px">
B(1,2) = 3×1+2 = <span class="hi">5</span><br>
A(5) = 4×5 = <span class="hi">20</span><br>
composition(A,B)(1,2) = <span class="hi">20</span>　等价于直接计算：12×1 + 4×2 = <span class="hi">20</span>
</div>
</div>
<div style="flex:1;min-width:220px"><pre class="code">${CODE[tab]}</pre></div>
</div>`;
  } else {
    h+=`<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
<div>
  <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px;font-family:var(--font-mono)">shape=(4,6) stride=(6,1) ÷ tile=(2,3)</div>
  ${mkGrid(sr,sc)}
</div>
<div style="flex:1;min-width:260px">
  ${infoBox(tab,sr,sc)}
  <pre class="code">${CODE[tab]}</pre>
</div>
</div>`;
  }
  document.getElementById('root').innerHTML=h;
}

function setTab(t){tab=t;render();}
function pick(r,c){sel=[r,c];render();}
render();
</script>
